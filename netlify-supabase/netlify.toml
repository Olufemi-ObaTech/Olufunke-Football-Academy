# ============================================================
# netlify.toml — MUST live at the root of the base directory
# Netlify reads this from: netlify-supabase/netlify.toml
# Set "Base directory" = netlify-supabase in Netlify UI
# ============================================================

[build]
  command = "npm run build"
  publish = ".next"

# Netlify Next.js plugin — handles SSR, API routes, and functions
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Serverless functions (in addition to Next.js API routes)
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**"]

# ---- Redirects -----------------------------------------------
# Auth callback — handled by Netlify function
[[redirects]]
  from   = "/auth/callback"
  to     = "/.netlify/functions/auth-handler"
  status = 200
  force  = true

# ---- Security Headers ----------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "camera=(), microphone=(), geolocation=()"
