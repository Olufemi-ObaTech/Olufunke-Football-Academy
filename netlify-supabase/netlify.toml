# ============================================================
# netlify.toml — OFA Academy (Netlify + Supabase)
# Base directory: netlify-supabase
# ============================================================

[build]
  base    = "netlify-supabase"
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory      = "netlify/functions"
  node_bundler   = "esbuild"

# ── Auth callback ──────────────────────────────────────────────
[[redirects]]
  from   = "/auth/callback"
  to     = "/.netlify/functions/auth-handler"
  status = 200
  force  = true

# ── API: Guardian portal ───────────────────────────────────────
[[redirects]]
  from   = "/api/guardian/*"
  to     = "/.netlify/functions/guardian-api"
  status = 200
  force  = true

# ── API: Education / courses ───────────────────────────────────
[[redirects]]
  from   = "/api/education/*"
  to     = "/.netlify/functions/education"
  status = 200
  force  = true

# ── API: Players ───────────────────────────────────────────────
[[redirects]]
  from   = "/api/players/*"
  to     = "/.netlify/functions/players"
  status = 200
  force  = true

# ── API: Quiz ──────────────────────────────────────────────────
[[redirects]]
  from   = "/api/quiz/*"
  to     = "/.netlify/functions/quiz"
  status = 200
  force  = true

# ── API: Contact ───────────────────────────────────────────────
[[redirects]]
  from   = "/api/contact"
  to     = "/.netlify/functions/contact"
  status = 200
  force  = true

# ── Custom domain redirect: www → apex ─────────────────────────
[[redirects]]
  from   = "https://www.olufunkefootballacademy.com/*"
  to     = "https://olufunkefootballacademy.com/:splat"
  status = 301
  force  = true

# ── Security headers ───────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://cdn.jsdelivr.net https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co https://cdn.jsdelivr.net; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none';"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains; preload"

# ── Cache static assets ───────────────────────────────────────
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── CORS headers for serverless functions ─────────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "https://olufunkefootballacademy.com"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Requested-With, X-CSRF-Token"
    Access-Control-Max-Age       = "86400"
