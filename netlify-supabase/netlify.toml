# ============================================================
# netlify.toml — MUST live at the root of the base directory
# Netlify reads this from: netlify-supabase/netlify.toml
# Set "Base directory" = netlify-supabase in Netlify UI
#
# Required env vars in Netlify UI → Site Settings → Environment Variables:
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#   NEXT_PUBLIC_SITE_URL   (e.g. https://olufunkef00tballacademy.netlify.app)
# ============================================================

[build]
  command = "npm run build"
  publish = ".next"

# Netlify Next.js plugin — handles SSR, API routes, and image optimisation
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Serverless functions (in addition to Next.js API routes)
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**"]

# Local development: netlify dev
[dev]
  command   = "npm run dev"
  port      = 3000
  targetPort = 3000

# ---- Redirects -----------------------------------------------
# Auth callback — handled by Netlify function
[[redirects]]
  from   = "/auth/callback"
  to     = "/.netlify/functions/auth-handler"
  status = 200
  force  = true

# ---- Security Headers ----------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co;"
