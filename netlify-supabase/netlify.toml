# ============================================================
# netlify.toml
# Place:  netlify-supabase/netlify.toml
# In Netlify UI → Deploy settings set:
#   Base directory  : netlify-supabase
#   Build command   : npm install && npm run build
#   Publish dir     : netlify-supabase/.next
# ============================================================

[build]
  base    = "netlify-supabase"
  command = "npm install && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory      = "netlify/functions"
  node_bundler   = "esbuild"

# ── Auth callback ──────────────────────────────────────────────
[[redirects]]
  from   = "/auth/callback"
  to     = "/.netlify/functions/auth-handler"
  status = 200
  force  = true

# ── Security headers ───────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
