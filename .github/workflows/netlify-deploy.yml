name: Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: netlify-supabase/package-lock.json

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@latest

      - name: Install project dependencies
        run: npm install
        working-directory: netlify-supabase

      - name: Deploy to Netlify (production build)
        run: netlify deploy --build --prod
        working-directory: netlify-supabase
        env:
          NETLIFY_AUTH_TOKEN:            ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:               ${{ secrets.NETLIFY_SITE_ID }}
          NEXT_PUBLIC_SUPABASE_URL:      https://fpqkewuoymyodveqbfjc.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL:          https://olufunkefootballacademy.netlify.app
