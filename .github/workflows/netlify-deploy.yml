name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time
concurrency:
  group: netlify-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: netlify-supabase/package-lock.json

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@latest

      # ── Sync ALL env vars to Netlify dashboard first ───────────
      # This ensures Netlify Functions (server-side) get the vars at runtime,
      # not just at build time. Required for: auth-middleware, guardian-api,
      # education, players, quiz, contact serverless functions.
      - name: Sync environment variables to Netlify
        run: |
          netlify env:set NEXT_PUBLIC_SUPABASE_URL      "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"      --force
          netlify env:set NEXT_PUBLIC_SUPABASE_ANON_KEY "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" --force
          netlify env:set SUPABASE_SERVICE_ROLE_KEY     "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"     --force
          netlify env:set NEXT_PUBLIC_SITE_URL          "https://olufunkefootballacademy.com"           --force
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}

      - name: Install project dependencies
        run: npm ci
        working-directory: netlify-supabase

      - name: Build project
        run: npm run build
        working-directory: netlify-supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL:          https://olufunkefootballacademy.com

      - name: Deploy to Netlify (production)
        run: netlify deploy --prod --dir=.next
        working-directory: netlify-supabase
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
