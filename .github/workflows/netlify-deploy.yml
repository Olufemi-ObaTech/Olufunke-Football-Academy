name: Build Check + Netlify Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: netlify-deploy
  cancel-in-progress: true

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: netlify-supabase/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: netlify-supabase

      # NEXT_PUBLIC_* keys are public/anon — safe to hardcode in CI.
      # SUPABASE_SERVICE_ROLE_KEY is only used in Netlify Functions at runtime
      # (not needed at build time), so it is intentionally omitted here.
      # All env vars are also set directly on the Netlify site via CLI.
      - name: Build Next.js
        run: npm run build
        working-directory: netlify-supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL:      https://fpqkewuoymyodveqbfjc.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwcWtld3VveW15b2R2ZXFiZmpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0OTgzOTQsImV4cCI6MjA5NjA3NDM5NH0.gSazLJ8QyhGRajQJcDc8GjfDVXh4KZLw_C5U6KEkrhw
          NEXT_PUBLIC_SITE_URL:          https://olufunkefootballacademy.com

      - name: Build passed
        run: echo "Build OK. Netlify auto-deploys via GitHub App on every push to main."

  deploy:
    name: Trigger Netlify Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 5

    steps:
      # Runs only if NETLIFY_AUTH_TOKEN secret is configured in GitHub repo settings
      - name: Trigger Netlify build via API
        if: secrets.NETLIFY_AUTH_TOKEN != ''
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/builds"
          echo "Netlify build triggered via API."

      # Always runs — deployment is handled by Netlify GitHub App regardless
      - name: Deploy note
        run: |
          echo "Live site: https://olufunkefootballacademy.com"
          echo "Netlify auto-deploys on every push to main via GitHub App integration."
