name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time
concurrency:
  group: netlify-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: netlify-supabase/package-lock.json

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@latest

      - name: Install project dependencies
        run: npm ci
        working-directory: netlify-supabase

      - name: Build project
        run: npm run build
        working-directory: netlify-supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL:          https://olufunkefootballacademy.com

      - name: Deploy to Netlify (production)
        run: netlify deploy --prod --dir=.next
        working-directory: netlify-supabase
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:   ${{ secrets.NETLIFY_SITE_ID }}
