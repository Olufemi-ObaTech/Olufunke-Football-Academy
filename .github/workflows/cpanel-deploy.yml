name: Deploy Laravel to WhoGoHost cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to cPanel
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, fileinfo, gd
          coverage: none

      - name: Install Composer dependencies (production only)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # ── Deploy Laravel app files (everything EXCEPT public/) ─────────────────
      # These go into ~/laravel/ on cPanel (one level above public_html)
      - name: Deploy Laravel app to ~/laravel/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:           ${{ secrets.CPANEL_FTP_HOST }}
          username:         ${{ secrets.CPANEL_FTP_USER }}
          password:         ${{ secrets.CPANEL_FTP_PASS }}
          port:             21
          server-dir:       laravel/
          local-dir:        ./
          exclude:          |
            **/.git*
            **/.git*/**
            .github/**
            netlify-supabase/**
            node_modules/**
            public/**
            .env
            .env.*
            *.md
            storage/logs/**
            storage/framework/cache/**
            storage/framework/sessions/**
            storage/framework/views/**
          state-name:       .ftp-deploy-sync-state-laravel.json
          log-level:        minimal

      # ── Deploy public/ to ~/public_html/ ────────────────────────────────────
      # index.php auto-detects ~/laravel/ so no path changes needed
      - name: Deploy public/ to ~/public_html/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:           ${{ secrets.CPANEL_FTP_HOST }}
          username:         ${{ secrets.CPANEL_FTP_USER }}
          password:         ${{ secrets.CPANEL_FTP_PASS }}
          port:             21
          server-dir:       public_html/
          local-dir:        ./public/
          exclude:          |
            **/.git*
          state-name:       .ftp-deploy-sync-state-public.json
          log-level:        minimal

      - name: Deploy complete
        run: |
          echo "Laravel deployed to WhoGoHost cPanel"
          echo "Live: https://olufunkefootballacademy.com"
